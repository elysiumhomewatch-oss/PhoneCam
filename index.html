<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Cams Viewer – Single Feed</title>
  <link rel="icon" href="data:,">
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 15px;
      min-height: 100vh;
    }
    h1 {
      margin: 0 0 20px;
      text-align: center;
    }
    #sheet-input {
      max-width: 600px;
      margin: 0 auto 30px;
      text-align: center;
    }
    #sheetUrl {
      width: 80%;
      max-width: 500px;
      padding: 10px;
      font-size: 1em;
      border-radius: 6px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      margin-left: 10px;
      background: #444;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #666; }
    #camera-select-container {
      text-align: center;
      margin: 30px 0;
    }
    #camera-select {
      padding: 12px;
      font-size: 1.1em;
      width: 80%;
      max-width: 500px;
      border-radius: 6px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
    }
    #preview-container {
      max-width: 900px;
      margin: 0 auto 20px;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    #preview-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }
    #loading, #no-cameras, #no-selection {
      text-align: center;
      margin: 40px 0;
      color: #aaa;
      font-size: 1.2em;
    }
    #refresh-info {
      text-align: center;
      color: #888;
      font-size: 0.9em;
      margin: 10px 0;
    }
  </style>
</head>
<body>

  <h1>Phone Cams Viewer</h1>

  <div id="sheet-input">
    <input type="url" id="sheetUrl" placeholder="Paste your Google Sheet URL here">
    <button onclick="loadCameras()">Load / Refresh</button>
  </div>

  <div id="camera-select-container">
    <select id="camera-select" onchange="startCameraFeed()">
      <option value="">-- Select a Camera --</option>
    </select>
  </div>

  <div id="loading">Loading cameras...</div>
  <div id="no-cameras" class="hidden">No cameras found in this sheet</div>
  <div id="no-selection" class="hidden">Select a camera above to view live feed</div>

  <div id="preview-container" class="hidden">
    <img id="preview-img" alt="Camera feed">
  </div>

  <div id="refresh-info" class="hidden">Feed refreshes every 10 seconds</div>

  <script>
    const STORAGE_KEY = 'viewerSheetUrl';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyyJMgpDxOSiEOK65ZzVuhJ8Am5Jfx2Yl2cGv26oTxJtqlIs-6MN7IwNqJgswtKNkGZ/exec';

    const sheetInput    = document.getElementById('sheetUrl');
    const select        = document.getElementById('camera-select');
    const loading       = document.getElementById('loading');
    const noCameras     = document.getElementById('no-cameras');
    const noSelection   = document.getElementById('no-selection');
    const previewCont   = document.getElementById('preview-container');
    const previewImg    = document.getElementById('preview-img');
    const refreshInfo   = document.getElementById('refresh-info');

    let currentCameraId = null;
    let refreshTimer    = null;

    // Load saved sheet URL on page load
    window.addEventListener('load', () => {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        sheetInput.value = saved;
        loadCameras();
      }
    });

    async function loadCameras() {
      const url = sheetInput.value.trim();
      if (!url) {
        alert('Please enter a Sheet URL');
        return;
      }

      localStorage.setItem(STORAGE_KEY, url);

      loading.textContent = 'Loading cameras...';
      loading.classList.remove('hidden');
      noCameras.classList.add('hidden');
      noSelection.classList.add('hidden');
      previewCont.classList.add('hidden');
      select.innerHTML = '<option value="">-- Select a Camera --</option>';

      try {
        const sheetId = extractSheetId(url);
        if (!sheetId) throw new Error('Invalid Sheet URL');

        const resp = await fetch(`${SCRIPT_URL}?sheetId=${sheetId}&action=list`);
        if (!resp.ok) throw new Error('Failed to load camera list');

        const cameras = await resp.json();

        if (!cameras || cameras.length === 0) {
          loading.classList.add('hidden');
          noCameras.classList.remove('hidden');
          return;
        }

        loading.classList.add('hidden');
        noSelection.classList.remove('hidden');

        cameras.forEach(cam => {
          const option = document.createElement('option');
          option.value = cam.id;
          option.textContent = `${cam.name || cam.id} (${cam.id})`;
          if (cam.desc) option.title = cam.desc;
          select.appendChild(option);
        });

      } catch (err) {
        loading.textContent = 'Error: ' + err.message;
        console.error(err);
      }
    }

    async function startCameraFeed() {
      const cameraId = select.value;
      if (!cameraId) {
        previewCont.classList.add('hidden');
        noSelection.classList.remove('hidden');
        if (refreshTimer) clearInterval(refreshTimer);
        return;
      }

      currentCameraId = cameraId;
      noSelection.classList.add('hidden');
      previewCont.classList.remove('hidden');

      // Clear old timer
      if (refreshTimer) clearInterval(refreshTimer);

      // Load first image immediately
      await loadSingleImage();

      // Then refresh every 10 seconds
      refreshTimer = setInterval(loadSingleImage, 10000);
    }

    async function loadSingleImage() {
      if (!currentCameraId) return;

      const sheetId = extractSheetId(sheetInput.value.trim());
      if (!sheetId) return;

      try {
        const resp = await fetch(`${SCRIPT_URL}?sheetId=${sheetId}&cameraId=${currentCameraId}`);
        if (!resp.ok) throw new Error('Failed to load image');

        const base64 = await resp.text();
        if (base64 && base64.startsWith('data:image')) {
          previewImg.src = base64 + '?t=' + Date.now(); // cache bust
          previewImg.style.opacity = '1';
        } else {
          previewImg.src = '';
          previewImg.style.opacity = '0';
        }
      } catch (err) {
        console.warn('Image load error for', currentCameraId, err);
        previewImg.src = '';
        previewImg.style.opacity = '0';
      }
    }

    function extractSheetId(url) {
      const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
      return match ? match[1] : null;
    }
  </script>
</body>
</html>
